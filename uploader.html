<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Video Uploader</title></head>
<body style="font-family:monospace;background:#0d1117;color:#c9d1d9;padding:20px;max-width:800px">
<h2 style="color:#58a6ff">Upload Videos to GitHub Portfolio</h2>
<p>Select all .mp4 files from <code>Downloads/videos_to_upload</code> folder:</p>
<input type="file" id="fi" multiple accept=".mp4" style="margin:10px 0;display:block;color:#c9d1d9">
<div id="progress" style="color:#ffa657;font-weight:bold;margin:10px 0"></div>
<div id="log" style="font-size:13px;line-height:1.8"></div>
<script>
var TK=window._TK||'';
var REPO='doudoushco/doudoushco.github.io';
function log(msg,c){var d=document.getElementById('log');d.innerHTML+='<div style="color:'+(c||'#c9d1d9')+'">'+msg+'</div>';window.scrollTo(0,document.body.scrollHeight);}
function prog(msg){document.getElementById('progress').textContent=msg;}
function toB64(file){return new Promise((res,rej)=>{var r=new FileReader();r.onload=e=>res(e.target.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);})}
document.getElementById('fi').onchange=async function(e){
  if(!TK){log('ERROR: Token not set','#f85149');return;}
  var files=Array.from(e.target.files).filter(function(f){return f.name.endsWith('.mp4');});
  log('Found '+files.length+' mp4 files to process','#79c0ff');
  var done=0,skip=0,err=0;
  for(var i=0;i<files.length;i++){
    var file=files[i];
    var path='videos/'+file.name;
    prog('['+(i+1)+'/'+files.length+'] Checking '+file.name+'...');
    var chk=await fetch('https://api.github.com/repos/'+REPO+'/contents/'+path,{headers:{'Authorization':'token '+TK,'Accept':'application/vnd.github.v3+json'}});
    if(chk.ok){log('SKIP: '+file.name+' (already on GitHub)','#6e7681');skip++;continue;}
    prog('['+(i+1)+'/'+files.length+'] Encoding '+file.name+' ('+Math.round(file.size/1024/1024)+'MB)...');
    var b64;
    try{b64=await toB64(file);}catch(ex){log('ERR encoding '+file.name+': '+ex.message,'#f85149');err++;continue;}
    prog('['+(i+1)+'/'+files.length+'] Uploading '+file.name+'...');
    try{
      var r=await fetch('https://api.github.com/repos/'+REPO+'/contents/'+path,{
        method:'PUT',
        headers:{'Authorization':'token '+TK,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
        body:JSON.stringify({message:'Add video '+file.name,content:b64})
      });
      var d=await r.json().catch(function(){return{};});
      if(r.ok){log('OK: '+file.name,'#56d364');done++;}
      else{log('ERR '+r.status+': '+file.name+' - '+(d.message||'?'),'#f85149');err++;}
    }catch(ex){log('ERR '+file.name+': '+ex.message,'#f85149');err++;}
  }
  prog('DONE: '+done+' uploaded, '+skip+' skipped, '+err+' errors');
};
</script>
</body>
</html>
