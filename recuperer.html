<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>Recuperation Doudoush</title><meta name="viewport" content="width=device-width,initial-scale=1"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,sans-serif;background:#f5f5f5;padding:1.5rem}.box{background:white;border-radius:16px;padding:2rem;max-width:540px;margin:auto;box-shadow:0 4px 30px rgba(0,0,0,.1)}h2{font-size:1.3rem;margin-bottom:.5rem}.sub{color:#777;font-size:.88rem;margin-bottom:1.5rem;line-height:1.6}.btn{width:100%;background:#FF6B6B;color:white;border:none;padding:1rem;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer;margin-top:.5rem}.btn:disabled{background:#ccc}.log{margin-top:1.2rem;background:#f9f9f9;border-radius:10px;padding:1rem;font-size:.82rem;line-height:2;max-height:380px;overflow-y:auto;display:none}.ok{color:#06C49A;font-weight:600}.err{color:#FF6B6B;font-weight:600}.info{color:#444}.prog{width:100%;height:8px;background:#eee;border-radius:4px;margin-top:1rem;overflow:hidden}.bar{height:100%;background:#FF6B6B;border-radius:4px;transition:width .3s;width:0}</style></head><body><div class="box"><div style="font-size:2.8rem;margin-bottom:.7rem">🚑</div><h2>Recuperation complete du portfolio</h2><p class="sub">Ce bouton recupere toutes tes <b>videos et photos</b> stockees dans Safari et les publie sur GitHub pour que tes clients voient tout.</p><button class="btn" id="btn" onclick="go()">Demarrer la recuperation</button><div class="prog"><div class="bar" id="bar"></div></div><div class="log" id="log"></div></div><script>
var REPO='doudoushco/doudoushco.github.io';
var DB='doudoush_db',ST='videos';
var le,be;
function L(m,c){if(!le){le=document.getElementById('log');le.style.display='block';}var d=document.createElement('div');d.className=c||'info';d.textContent=m;le.appendChild(d);le.scrollTop=le.scrollHeight;}
function P(n){if(!be)be=document.getElementById('bar');be.style.width=n+'%';}
function b2b(b){return new Promise(function(res,rej){var fr=new FileReader();fr.onload=function(e){res(e.target.result.split(',')[1]);};fr.onerror=rej;fr.readAsDataURL(b);});}
function s2b(s){var e=new TextEncoder().encode(s);var b='';for(var i=0;i<e.length;i+=8192)b+=String.fromCharCode.apply(null,e.subarray(i,i+8192));return btoa(b);}
function oDb(){return new Promise(function(r,j){var q=indexedDB.open(DB,1);q.onsuccess=function(e){r(e.target.result);};q.onerror=function(e){j(e.target.error);};q.onupgradeneeded=function(e){e.target.result.createObjectStore(ST);}});}
function aB(db){return new Promise(function(r,j){var rows=[],tx=db.transaction(ST,'readonly'),req=tx.objectStore(ST).openCursor();req.onsuccess=function(e){var c=e.target.result;if(c){rows.push({key:c.key,blob:c.value});c.continue();}else r(rows);};req.onerror=function(e){j(e.target.error);}});}
async function aG(p,tk){var r=await fetch('https://api.github.com/repos/'+REPO+'/contents/'+p,{headers:{Authorization:'Bearer '+tk,Accept:'application/vnd.github+json'}});return r.ok?r.json():null;}
async function aP(p,b64,sha,msg,tk){var body={message:msg,content:b64};if(sha)body.sha=sha;var r=await fetch('https://api.github.com/repos/'+REPO+'/contents/'+p,{method:'PUT',headers:{Authorization:'Bearer '+tk,Accept:'application/vnd.github+json','Content-Type':'application/json'},body:JSON.stringify(body)});var d=await r.json();if(!r.ok)throw new Error(d.message||'err');return d;}
async function go(){
var btn=document.getElementById('btn');btn.disabled=true;btn.textContent='En cours...';
try{
var tk=localStorage.getItem('gh_deploy_token')||'';
if(!tk){tk=prompt('Token GitHub (ghp_...) :');if(tk)localStorage.setItem('gh_deploy_token',tk);}
if(!tk)throw new Error('Token manquant');
L('Lecture du site...');P(5);
var gf=await aG('index.html',tk);if(!gf)throw new Error('index.html introuvable');
var sha=gf.sha,bin=atob(gf.content.replace(/\n/g,'')),arr=new Uint8Array(bin.length);
for(var i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
var html=new TextDecoder('utf-8').decode(arr);
L('Site lu ('+Math.round(html.length/1024)+' KB)','ok');
var m=html.match(/const PRELOADED_DATA = (\{[\s\S]*?\});/);if(!m)throw new Error('DATA introuvable');
var data=JSON.parse(m[1]);L(data.photo.length+' photos, '+data.video.length+' videos publiees');
L('');L('Videos IndexedDB...');P(12);
var blobs=[];
try{var db=await oDb();blobs=await aB(db);L(blobs.length>0?blobs.length+' video(s) dans Safari':'Aucune video locale (deja publiees ou supprimees)',blobs.length>0?'ok':'err');}catch(e){L('IndexedDB: '+e.message,'err');}
var ghV=[];try{var gv=await aG('videos',tk);if(gv)ghV=gv.map(function(f){return f.name;});}catch(e){}
L(ghV.length+' video(s) deja sur GitHub');
var vUp=0;
for(var i=0;i<blobs.length;i++){
var bk=blobs[i].key,bb=blobs[i].blob;var ext=(bb.type||'video/mp4').split('/')[1]||'mp4';var fn=bk+'.'+ext;
P(12+Math.round(35*i/Math.max(blobs.length,1)));
if(ghV.indexOf(fn)>=0){L('Deja presente: '+bk.substring(0,10));continue;}
try{L('Upload '+(i+1)+'/'+blobs.length+': '+bk.substring(0,10)+'...');var b64=await b2b(bb);await aP('videos/'+fn,b64,null,'Video '+bk,tk);var en=data.video.find(function(v){return v.videoId===bk;});if(en){en.videoUrl='https://doudoushco.github.io/videos/'+fn;en.link=en.videoUrl;delete en.videoId;delete en.videoName;}vUp++;L('OK: '+(en?en.title:fn.substring(0,14)),'ok');}catch(e){L('ERREUR: '+bk.substring(0,10)+': '+e.message,'err');}
}
L('');L('Photos localStorage...');P(50);
var lsP=[];try{var raw=localStorage.getItem('doudoush_photos');if(raw)lsP=JSON.parse(raw);}catch(e){}
var eIds=new Set(data.photo.map(function(p){return p.id;}));L(lsP.length+' photo(s) dans Safari');
var pUp=0;
for(var i=0;i<lsP.length;i++){
var p=lsP[i];P(50+Math.round(25*i/Math.max(lsP.length,1)));
if(eIds.has(p.id))continue;
if(p.imgUrl&&p.imgUrl.indexOf('githubusercontent')>=0){data.photo.unshift(Object.assign({},p,{imgData:''}));eIds.add(p.id);pUp++;L('Photo URL: '+p.title,'ok');continue;}
if(p.imgData&&p.imgData.length>100){try{L('Photo: '+p.title+'...');var b64=p.imgData.split(',')[1]||p.imgData;await aP('images/'+p.id+'.jpg',b64,null,'Photo '+p.title,tk);data.photo.unshift(Object.assign({},p,{imgData:'',imgUrl:'https://raw.githubusercontent.com/'+REPO+'/main/images/'+p.id+'.jpg'}));eIds.add(p.id);pUp++;L('OK: '+p.title,'ok');}catch(e){L('ERR photo '+p.title+': '+e.message,'err');}}
}
L('');L('Publication finale...');P(80);
data.video.forEach(function(v){delete v._blobUrl;delete v.videoId;});
data.photo.forEach(function(p){if(p.imgUrl)p.imgData='';});
var nh=html.replace(/const PRELOADED_DATA = \{[\s\S]*?\};/,'const PRELOADED_DATA = '+JSON.stringify(data)+';');
nh=nh.replace(/(<body[^>]*?)\s+admin-mode/g,'$1').replace(/class="\s*"/g,'');
nh=nh.replace(/Traitement\.\.\.([^'"])/g,'Traitement...$1');
nh=nh.replace(/id="modal-save" style="display:[^"]*"/g,'id="modal-save" style="display:none"');
P(92);await aP('index.html',s2b(nh),sha,'Recuperation complete',tk);P(100);
L('');L('TERMINE ! '+vUp+' video(s) et '+pUp+' photo(s) recuperees','ok');
L('Attends 2 min puis recharge doudoushco.github.io','ok');
btn.textContent='Termine!';btn.style.background='#06C49A';
}catch(err){L('ERREUR: '+err.message,'err');btn.disabled=false;btn.textContent='Reessayer';}}
</script></body></html>
