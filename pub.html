<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/><title>Publication</title>
<style>body{font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#f5f5f5;}
.box{background:white;padding:2.5rem;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.1);max-width:440px;width:100%;text-align:center;}
h2{margin:0 0 1rem;font-size:1.4rem;} #msg{color:#555;margin:1rem 0;line-height:1.5;}
.ok{color:#06C49A;font-weight:700;font-size:1.1rem;} .err{color:#FF6B6B;font-weight:600;}
a{color:#FF6B6B;font-weight:700;text-decoration:none;}</style></head><body><div class="box">
<h2 id="title">&#x231B; Publication...</h2><p id="msg">D&eacute;marrage...</p></div><script>
(function(){
var KEYS={video:"doudoush_videos",photo:"doudoush_photos",article:"doudoush_articles",links:"doudoush_links"};
function load(k){try{var r=localStorage.getItem(KEYS[k]);return r?JSON.parse(r):[]}catch(e){return[]}}
function b64(s){return btoa(unescape(encodeURIComponent(s)))}
function setMsg(t){document.getElementById("msg").innerHTML=t;}
function setTitle(t){document.getElementById("title").innerHTML=t;}

// Read token from URL hash (safe - not sent to server)
var hashToken=(location.hash||"").replace(/^#/,"");
if(hashToken&&hashToken.length>10){
  localStorage.setItem("gh_deploy_token",hashToken);
  history.replaceState(null,"",location.pathname);
}

var token=localStorage.getItem("gh_deploy_token")||"";
if(!token){setTitle("&#x274C; Erreur");setMsg("Token manquant. Reconfigure GitHub dans les param&egrave;tres.");return;}

var data={video:load("video"),photo:load("photo"),article:load("article"),links:load("links")};
setMsg("&#x1F4F8; "+data.photo.length+" photos trouv&eacute;es — envoi en cours...");

fetch("https://api.github.com/repos/doudoushco/doudoushco.github.io/contents/index.html",{headers:{"Authorization":"token "+token}})
.then(function(r){return r.json();})
.then(function(d){
  if(!d.sha)throw new Error("Token invalide ("+JSON.stringify(d.message)+")");
  var html=decodeURIComponent(escape(atob(d.content.replace(/\n/g,""))));
  var nh=html.replace(/const PRELOADED_DATA = \{[\s\S]*?\};/,"const PRELOADED_DATA = "+JSON.stringify(data)+";");
  if(nh===html)throw new Error("Structure non reconnue");
  setMsg("Commit en cours...");
  return fetch("https://api.github.com/repos/doudoushco/doudoushco.github.io/contents/index.html",{
    method:"PUT",headers:{"Authorization":"token "+token,"Content-Type":"application/json"},
    body:JSON.stringify({message:"Sync "+data.photo.length+" photos admin",content:b64(nh),sha:d.sha})});
})
.then(function(r){return r.json().then(function(d){return{ok:r.ok,d:d};});})
.then(function(res){
  if(!res.ok)throw new Error(res.d.message||"Erreur");
  setTitle("&#x1F389; Publi&eacute; !");
  setMsg(data.photo.length+" photos en ligne !<br><br><a href='https://doudoushco.github.io' target='_blank'>&#x2192; Voir le site</a>");
})
.catch(function(e){setTitle("&#x274C; Erreur");setMsg(e.message);});
})();</script></body></html>
